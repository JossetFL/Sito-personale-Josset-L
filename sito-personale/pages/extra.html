    <!-- Assenze -->
    <div class="container-fluid mt-4">
        <div class="row justify-content-center">
            <div class="col-8">
                <h3 class="text-center">Quanti giorni ho fatto di assenza?</h3>
                <div class="input-group mb-3">
                    <input type="number" id="progresso" class="form-control" placeholder="Giorni" aria-label="Giorni">
                    <button onclick="assenze()" class="btn btn-outline-primary" type="button">Invia</button>
                </div>
            </div>
            <div class="col-8">
                <div class="progress" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" id="barra" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Prog bar -->
    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div class="col-8">
                <h3 class="text-center">Barra di progresso (0-100%)</h3>
                <div class="input-group mb-3">
                    <input type="number" id="percentualeInput" class="form-control" placeholder="Percentuale" min="0" max="100" aria-label="Percentuale">
                    <button onclick="aggiornaBarra()" class="btn btn-outline-primary" type="button">Aggiorna</button>
                </div>
            </div>
            <div class="col-8">
                <div class="progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" id="barraPercentuale" style="width: 0%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Calc -->
    <div class="container-fluid mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-8">
                <h3 class="text-center">Calcolatrice</h3>
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="number" id="num1" class="form-control" placeholder="Primo numero">
                    </div>
                    <div class="col-md-2">
                        <select id="operazione" class="form-select">
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="*">*</option>
                            <option value="/">/</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="number" id="num2" class="form-control" placeholder="Secondo numero">
                    </div>
                    <div class="col-md-2">
                        <button onclick="calcola()" class="btn btn-primary w-100">=</button>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-12">
                        <div class="alert alert-info text-center" id="risultato" role="alert">
                            Inserisci i numeri e premi =
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- script di bootstrap  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
